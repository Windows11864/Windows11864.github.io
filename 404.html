<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | 找不到输入点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background-color: #1a1a1a;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .code {
            font-size: 6rem;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        .msg {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }
        .back-btn {
            padding: 12px 20px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            color: #f0f0f0;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .back-btn:hover {
            background-color: #3d3d3d;
            border-color: #4CAF50;
        }
        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="msg">你访问的页面不存在或你输入的网址不存在</div>
        <a href="index.html" class="back-btn">返回主页</a>
        <div class="footer">
            © 2026 SYSTEM-RAMOS-HZK | 鸣谢 GitHub 提供仓库与 Pages 服务
        </div>
    </div>
</body>
</html>
